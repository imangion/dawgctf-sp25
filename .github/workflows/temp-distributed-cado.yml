name: Temporary CADO client diagnostic

on:
  pull_request:
    branches: [ main ]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-requests libgmp10 libhwloc15 libsqlite3-0 curl

      - name: Restore compiled CADO tree
        uses: actions/cache/restore@v4
        with:
          path: cado-nfs
          key: temporary-cado-29153764667
          fail-on-cache-miss: true

      - name: Test endpoint and CADO client
        shell: bash
        env:
          ENDPOINT: https://insider-grab-kills-locks.trycloudflare.com
        run: |
          set +e
          echo '===== CURL ROOT =====' | tee diagnostic.log
          curl -vk --max-time 20 "$ENDPOINT/" 2>&1 | tee -a diagnostic.log

          cd cado-nfs
          export HOSTNAME=cado-runner
          eval "$(make show)"
          echo "build_tree=$build_tree" | tee -a ../diagnostic.log

          timeout 180s python3 ./cado-nfs-client.py \
            --server="$ENDPOINT" \
            --bindir="$build_tree" \
            --basepath=/tmp/cado-diagnostic \
            --clientid="gha-diagnostic-${GITHUB_RUN_ID}" \
            --downloadretry=2 \
            --max_connection_failures=3 \
            --nocncheck \
            --nosha1check \
            --loglevel=DEBUG \
            --logfile="$GITHUB_WORKSPACE/client.log" 2>&1 | tee -a ../diagnostic.log
          RC=${PIPESTATUS[0]}
          echo "client_rc=$RC" | tee -a ../diagnostic.log
          exit 0

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cado-client-diagnostic-${{ github.run_id }}
          path: |
            diagnostic.log
            client.log
          retention-days: 1
